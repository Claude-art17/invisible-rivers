<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invisible Rivers — 提交记录</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
    background: #f5f5f5;
    color: #000;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 {
    font-family: 'Josefin Sans', 'Segoe UI', 'PingFang SC', sans-serif;
    font-size: 24px;
    font-weight: 200;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .count { font-size: 12px; letter-spacing: 2px; color: #888; margin-bottom: 32px; }
  .divider { width: 48px; height: 1px; background: #000; margin-bottom: 36px; }
  .card {
    border-top: 1px solid #ddd;
    padding: 20px 0;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .card-name { font-size: 16px; letter-spacing: 2px; font-weight: bold; }
  .card-time { font-size: 11px; color: #aaa; letter-spacing: 1px; }
  .card-mood { font-size: 13px; color: #666; letter-spacing: 1px; margin-bottom: 8px; }
  .card-thoughts { font-size: 14px; line-height: 1.7; color: #333; margin-bottom: 12px; }
  .card-images { display: flex; gap: 8px; flex-wrap: wrap; }
  .card-images img {
    max-width: 160px;
    max-height: 120px;
    border-radius: 2px;
    border: 1px solid #ddd;
    cursor: pointer;
    transition: opacity 0.2s;
    object-fit: cover;
  }
  .card-images img:hover { opacity: 0.8; }
  .empty { text-align: center; color: #aaa; padding: 60px 0; font-size: 14px; letter-spacing: 2px; }
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 2px; }
  .refresh { margin-bottom: 20px; }
  .refresh a {
    font-size: 11px; letter-spacing: 2px; color: #888; text-decoration: none;
    border: 1px solid #ccc; padding: 6px 14px; border-radius: 2px; transition: all 0.2s;
  }
  .refresh a:hover { background: #000; color: #fff; border-color: #000; }
</style>
</head>
<body>
<div class="wrap">
  <div class="refresh"><a href="index.html">&larr; 返回提交页</a></div>
  <h1>Invisible Rivers</h1>
  <p class="count">提交记录</p>
  <div class="divider"></div>
  <div id="list"></div>
</div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img src="" alt="">
</div>
<script>
var SUPABASE_URL = 'https://neqwiaprxwwjtycqwcjc.supabase.co';

(function() {
  var list = document.getElementById('list');
  var countEl = document.querySelector('.count');
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = lightbox.querySelector('img');

  fetch('/.netlify/functions/list')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    countEl.textContent = data.length + ' 条提交';
    if (!data.length) {
      list.innerHTML = '<div class="empty">暂无提交记录</div>';
      return;
    }
    var html = '';
    data.forEach(function(s) {
      var time = s.created_at ? new Date(s.created_at).toLocaleString('zh-CN') : '';
      var imgHtml = '';
      if (s.image_urls && s.image_urls.length) {
        imgHtml = '<div class="card-images">';
        s.image_urls.forEach(function(url) {
          imgHtml += '<img src="' + url + '" onclick="event.stopPropagation();var lb=document.getElementById(\'lightbox\');lb.querySelector(\'img\').src=\'' + url + '\';lb.classList.add(\'show\')" loading="lazy">';
        });
        imgHtml += '</div>';
      }
      var mood = s.mood || '';
      html += '<div class="card">'
        + '<div class="card-header"><span class="card-name">' + esc(s.name) + '</span><span class="card-time">' + time + '</span></div>'
        + (mood ? '<div class="card-mood">' + esc(mood) + '</div>' : '')
        + '<div class="card-thoughts">' + esc(s.thoughts) + '</div>'
        + imgHtml
        + '</div>';
    });
    list.innerHTML = html;
  })
  .catch(function() {
    list.innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
  });

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>
</body>
</html>
